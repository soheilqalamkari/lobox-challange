spring.application.name=imdb-service
server.servlet.context-path=/api/lobox/imdb-service
server.port=8181
server.address=localhost


spring.threads.virtual.enabled=true

spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:file:./data/lobox_imdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB